<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Utilisateur</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e8f8f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; width: 460px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #27ae60; margin-bottom: 12px; }
        p { color: #555; margin-bottom: 22px; }
        .btn { display: inline-block; margin: 6px; padding: 10px 20px; border-radius: 6px; text-decoration: none; color: white; font-size: 14px; border: none; cursor: pointer; }
        .btn-home   { background: #2b5797; } .btn-home:hover   { background: #1e3f70; }
        .btn-logout { background: #95a5a6; } .btn-logout:hover { background: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👤 Dashboard Utilisateur</h2>
        <p>
            Connecté : <strong sec:authentication="name">user</strong><br>
            <small>Accessible aux rôles <strong>ROLE_USER</strong> et <strong>ROLE_ADMIN</strong></small>
        </p>
        <a th:href="@{/home}" class="btn btn-home">🏠 Accueil</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-logout">🚪 Déconnexion</button>
        </form>
    </div>
</body>
</html>
