<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #2b5797; margin-bottom: 8px; }
        .subtitle { color: #777; font-size: 14px; margin-bottom: 20px; }
        .badge { display: inline-block; background: #eaf0fb; color: #2b5797; padding: 4px 14px; border-radius: 20px; font-size: 13px; margin-bottom: 28px; font-weight: bold; }
        .btn { display: inline-block; margin: 6px; padding: 10px 22px; border-radius: 6px; text-decoration: none; color: white; font-size: 14px; cursor: pointer; border: none; }
        .btn-admin  { background: #e74c3c; }
        .btn-admin:hover  { background: #c0392b; }
        .btn-user   { background: #27ae60; }
        .btn-user:hover   { background: #1e8449; }
        .btn-logout { background: #95a5a6; font-size: 14px; padding: 10px 22px; }
        .btn-logout:hover { background: #7f8c8d; }
        .db-info { margin-top: 24px; padding: 14px; background: #f8f9fa; border-radius: 8px; font-size: 13px; color: #555; text-align: left; }
        .db-info strong { color: #2b5797; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🏠 Page d'accueil</h2>
        <p class="subtitle">Connecté en tant que <strong sec:authentication="name">?</strong></p>

        <div class="badge" sec:authentication="authorities">ROLES</div>

        <div>
            <a th:href="@{/admin/dashboard}"
               sec:authorize="hasRole('ADMIN')"
               class="btn btn-admin">👑 Dashboard Admin</a>

            <a th:href="@{/user/dashboard}"
               sec:authorize="hasAnyRole('USER','ADMIN')"
               class="btn btn-user">👤 Dashboard User</a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-logout">🚪 Déconnexion</button>
            </form>
        </div>

        <div class="db-info">
            <strong>✅ Authentification via MySQL + BCrypt</strong><br>
            Les utilisateurs sont chargés depuis la base de données.<br>
            Les mots de passe sont hachés avec l'algorithme BCrypt.
        </div>
    </div>
</body>
</html>
