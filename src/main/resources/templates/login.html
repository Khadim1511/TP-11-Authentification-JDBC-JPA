<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 25px; color: #1a1a2e; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 14px; }
        input { width: 100%; padding: 10px 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #2b5797; }
        button { width: 100%; padding: 12px; background: #2b5797; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #1e3f70; }
        .msg { text-align: center; margin-bottom: 14px; font-size: 13px; padding: 8px; border-radius: 5px; }
        .error  { background: #fdecea; color: #c0392b; }
        .logout { background: #eafaf1; color: #27ae60; }
        .info   { color: #888; font-size: 12px; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Connexion</h2>

        <p th:if="${param.error}" class="msg error">
            ❌ Identifiants incorrects. Réessayez.
        </p>
        <p th:if="${param.logout}" class="msg logout">
            ✅ Déconnexion réussie.
        </p>

        <form th:action="@{/login}" method="post">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="admin ou user" required autofocus />

            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="Mot de passe" required />

            <button type="submit">Se connecter</button>
        </form>

        <p class="info">Comptes : admin/1234 · user/1111</p>
    </div>
</body>
</html>
