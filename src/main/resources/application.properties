# =============================================
# Configuration de la base de données MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/security_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# =============================================
# Configuration JPA / Hibernate
# =============================================
# update = crée ou met à jour les tables automatiquement
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console (utile pour le débogage)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Port du serveur
# =============================================
server.port=8080
